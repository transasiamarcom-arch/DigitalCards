<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Erba Digital Card</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container py-4">

<div class="card shadow-lg border-0 mx-auto" id="card">

<div class="text-center header">

<!--<img src="assets/logo.png" id="logo">-->

</div>

<div class="text-center p-4">

<img
id="photo"
class="rounded-circle shadow"
width="140"
height="140"
src="assets/employees/default.png">

<h2 id="name" class="mt-3"></h2>

<h5 id="designation"></h5>

<p id="department"></p>

</div>

<div class="container pb-4">

<div class="d-grid gap-2">

<a id="callBtn" class="btn btn-success">

<i class="bi bi-telephone-fill"></i>

Call

</a>

<a id="waBtn" class="btn btn-success">

<i class="bi bi-whatsapp"></i>

WhatsApp

</a>

<a id="emailBtn" class="btn btn-primary">

<i class="bi bi-envelope-fill"></i>

Email

</a>

<a id="websiteBtn"

class="btn btn-info text-white"

href="https://transasia.co.in"

target="_blank">

<i class="bi bi-globe"></i>

Website

</a>

<a id="mapBtn"

class="btn btn-warning"

target="_blank">

<i class="bi bi-geo-alt-fill"></i>

Navigate

</a>

<a id="saveBtn"

class="btn btn-dark">

<i class="bi bi-person-vcard-fill"></i>

Save Contact

</a>

</div>

<hr>

<h4 class="text-center">

Connect With Us

</h4>

<div class="social">

<a

href="https://www.instagram.com/transasia_biomedicals/"

target="_blank">

<i class="bi bi-instagram"></i>

</a>

<a

href="https://www.facebook.com/TransasiaBioMedicalsIN"

target="_blank">

<i class="bi bi-facebook"></i>

</a>

<a

href="https://in.linkedin.com/company/transasia-bio-medicals-ltd"

target="_blank">

<i class="bi bi-linkedin"></i>

</a>

<a

href="https://www.youtube.com/channel/UCwqsRLT5nfZYX6AhEn8pdUw"

target="_blank">

<i class="bi bi-youtube"></i>

</a>

<a

href="https://x.com/Transasia_1"

target="_blank">

<i class="bi bi-twitter-x"></i>

</a>

</div>

<hr>

<div class="text-center">

<img id="qr"

width="170">

</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
